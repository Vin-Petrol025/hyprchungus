font_family GeistMono Nerd Font Mono
font_size 13

disable_ligatures no
enable_audio_bell no

shell zsh
shell_integration disabled

cursor_shape beam

url_style curly

remember_window_size no
initial_window_width 640
initial_window_height 480
window_padding_width 18

cursor_blink_interval 0.3

background_opacity 0.3
scrollbar_handle_opacity 0
scrollbar_track_opacity 0
scrollbar_track_hover_opacity 0

confirm_os_window_close 0

sync_to_monitor no

background            #3a3c3e
foreground            #d9eed2
cursor                #41ff58
selection_background  #2a9b34
color0                #1e1e1e
color8                #03260f
color1                #fb0029
color9                #a6ff3e
color2                #329b24
color10               #9fff6d
color3                #649a25
color11               #d1ff6d
color4                #149b45
color12               #72ffb5
color5                #53b82b
color13               #50ff3d
color6                #2bb767
color14               #22ff71
color7                #dffeee
color15               #daeed0
selection_foreground #3a3c3e
